<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAFT Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="cursorLayer"></div>
  <div id="toastContainer"></div>

  <!-- name modal-->
  <div class="name-modal-bg" id="nameModalBg">
    <div class="name-modal">
      <h2>Welcome to RAFT Board</h2>
      <p>What should others call you?</p>
      <input type="text" id="nameInput" placeholder="Your name…" maxlength="24" autocomplete="off" />
      <button id="nameSubmit">Join session</button>
    </div>
  </div>

  <!--main -->
  <div class="app-shell" id="appView" style="display:none">

    <header class="topbar">
      <div class="topbar-brand">
        <div class="brand-text">
          <span class="brand-name">RAFT Board</span>
          <span class="brand-sub">distributed whiteboard</span>
        </div>
      </div>

      <div class="topbar-mid">
        <div class="status-pill">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusLabel">Connecting…</span>
        </div>
        <div class="leader-pill" id="leaderPill">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
          <span id="leaderLabel">leader: —</span>
        </div>
      </div>

      <div class="topbar-right">
        <div class="peer-avatars" id="peerAvatars"></div>

        <!-- Name change button -->
        <button class="topbar-btn" id="btnChangeName" title="Change your name">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 13a4 4 0 100-8 4 4 0 000 8z"/><path d="M2 17c0-2.2 3.6-4 8-4s8 1.8 8 4"/></svg>
          <span id="myNameLabel">You</span>
        </button>

        <button class="topbar-btn" id="btnDownload" title="Download canvas (Ctrl+S)">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 3v9M6 8l4 4 4-4"/><path d="M3 15v1a1 1 0 001 1h12a1 1 0 001-1v-1"/></svg>
          Download
        </button>
        <button class="topbar-btn accent" id="btnOpenLogs" title="View logs">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="14" height="14" rx="2"/><path d="M7 7h6M7 10h4M7 13h5"/></svg>
          Logs
        </button>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar">

        <section class="tool-section">
          <span class="tool-label">Colour</span>
          <div class="swatches" id="swatches">
            <button class="swatch active" data-color="#93c5fd" style="--c:#93c5fd"></button>
            <button class="swatch" data-color="#60a5fa" style="--c:#60a5fa"></button>
            <button class="swatch" data-color="#3b82f6" style="--c:#3b82f6"></button>
            <button class="swatch" data-color="#a5f3fc" style="--c:#a5f3fc"></button>
            <button class="swatch" data-color="#6ee7b7" style="--c:#6ee7b7"></button>
            <button class="swatch" data-color="#c4b5fd" style="--c:#c4b5fd"></button>
            <button class="swatch" data-color="#f9a8d4" style="--c:#f9a8d4"></button>
            <button class="swatch" data-color="#fde68a" style="--c:#fde68a"></button>
            <button class="swatch" data-color="#fb923c" style="--c:#fb923c"></button>
            <button class="swatch" data-color="#f1f5f9" style="--c:#f1f5f9;border:1.5px solid #cbd5e1"></button>
            <button class="swatch" data-color="#64748b" style="--c:#64748b"></button>
            <button class="swatch" data-color="#0f172a" style="--c:#0f172a"></button>
          </div>
          <label class="custom-color-wrap" title="Custom colour">
            <input type="color" id="colorPicker" value="#93c5fd" />
            <span class="custom-color-label">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v6M5 8h6"/></svg>
              Custom
            </span>
            <div class="custom-preview" id="customPreview"></div>
          </label>
        </section>

        <div class="divider"></div>

        <section class="tool-section">
          <span class="tool-label">Size</span>
          <div class="size-btns" id="sizeBtns">
            <button class="size-btn active" data-size="2"><span style="width:4px;height:4px"></span></button>
            <button class="size-btn" data-size="6"><span style="width:9px;height:9px"></span></button>
            <button class="size-btn" data-size="14"><span style="width:15px;height:15px"></span></button>
            <button class="size-btn" data-size="28"><span style="width:22px;height:22px"></span></button>
          </div>
        </section>

        <div class="divider"></div>

        <section class="tool-section">
          <span class="tool-label">Tool</span>
          <div class="tool-btns">
            <button class="tool-btn active" id="btnDraw">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2.5a2.12 2.12 0 013 3L6 17l-4 1 1-4L14 2.5z"/></svg>
              Draw
            </button>
            <button class="tool-btn" id="btnErase">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 16H7L3 12l9-9 5 5-3 3"/><path d="M5 15l2-2"/></svg>
              Erase
            </button>
          </div>
        </section>

        <div class="divider"></div>

        <section class="tool-section">
          <button class="clear-btn" id="btnClear">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="3 5 5 5 17 5"/><path d="M15 5l-.87 11.14A2 2 0 0112.14 18H7.86A2 2 0 015.87 16.14L5 5"/><path d="M8 9v6M12 9v6M7 5V3h6v2"/></svg>
            Clear canvas
          </button>
        </section>

      </aside>

      <main class="stage">
        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="canvas"></canvas>
        </div>
      </main>
    </div>

    <footer class="statusbar">
      <span id="coordDisplay">Ready</span>
      <span id="strokeCount">strokes: 0</span>
      <span id="clientCount">peers: —</span>
    </footer>

  </div>

  <!-- view logs -->
  <div class="logs-view" id="logsView">
    <header class="logs-topbar">
      <div class="brand-text">
        <span class="brand-name">RAFT Board</span>
        <span class="brand-sub">session logs</span>
      </div>

      <div class="logs-stats">
        <div class="stat-chip">
          <span class="stat-dot" id="logStatusDot"></span>
          <span id="logStatusLabel">—</span>
        </div>
        <div class="stat-chip">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3v5l3 3"/><circle cx="8" cy="8" r="6"/></svg>
          <span id="logAvgLatency">avg RTT: —</span>
        </div>
        <div class="stat-chip">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 5h6M5 8h4M5 11h5"/></svg>
          <span id="logEntryCount">0 events</span>
        </div>
        <div class="stat-chip">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
          <span id="logLeader">leader: —</span>
        </div>
      </div>

      <div class="logs-actions">
        <button class="topbar-btn" id="btnClearLogs">Clear</button>
        <button class="topbar-btn" id="btnDownloadLogs">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 3v9M6 8l4 4 4-4"/><path d="M3 15v1a1 1 0 001 1h12a1 1 0 001-1v-1"/></svg>
          Download log
        </button>
        <button class="topbar-btn accent" id="btnCloseLogs">← Back to canvas</button>
      </div>
    </header>

    <div class="log-filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="ws">Connection</button>
      <button class="filter-btn" data-filter="stroke">Strokes</button>
      <button class="filter-btn" data-filter="latency">Latency</button>
      <button class="filter-btn" data-filter="error">Errors</button>
      <button class="filter-btn" data-filter="leader">Leader</button>
    </div>

    <div class="log-body" id="logBody"></div>
  </div>

  <script src="logger.js"></script>
  <script src="websocket.js"></script>
  <script src="canvas.js"></script>
</body>
</html>
