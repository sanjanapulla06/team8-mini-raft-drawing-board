<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini RAFT Drawing Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Caveat:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-shell">

    <header class="topbar">
      <div class="topbar-left">
        <div class="logo-mark">✦</div>
        <div class="logo-text">
          <span class="logo-title">Doodle Board</span>
          <span class="logo-sub">mini raft · distributed</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="ws-status" id="wsStatus">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-label" id="statusLabel">Connecting…</span>
        </div>
      </div>
    </header>

    <div class="workspace">

      <aside class="toolbar">

        <div class="tool-group">
          <label class="tool-label">Colour</label>
          <div class="color-swatches" id="colorSwatches">
            <button class="swatch active" data-color="#f9a8d4" style="background:#f9a8d4;" title="Pink"></button>
            <button class="swatch" data-color="#c4b5fd" style="background:#c4b5fd;" title="Lavender"></button>
            <button class="swatch" data-color="#93c5fd" style="background:#93c5fd;" title="Sky"></button>
            <button class="swatch" data-color="#6ee7b7" style="background:#6ee7b7;" title="Mint"></button>
            <button class="swatch" data-color="#fde68a" style="background:#fde68a;" title="Butter"></button>
            <button class="swatch" data-color="#fb923c" style="background:#fb923c;" title="Peach"></button>
            <button class="swatch" data-color="#f472b6" style="background:#f472b6;" title="Rose"></button>
            <button class="swatch" data-color="#a78bfa" style="background:#a78bfa;" title="Violet"></button>
            <button class="swatch dark" data-color="#4a4a6a" style="background:#4a4a6a;" title="Ink"></button>
          </div>
          <input type="color" id="colorPicker" value="#f9a8d4" title="Custom colour" />
          <label class="custom-color-label" for="colorPicker">✦ custom</label>
        </div>

        <div class="tool-group">
          <label class="tool-label">Size</label>
          <div class="size-options" id="sizeOptions">
            <button class="size-btn active" data-size="3"><span style="width:5px;height:5px;"></span></button>
            <button class="size-btn" data-size="7"><span style="width:9px;height:9px;"></span></button>
            <button class="size-btn" data-size="14"><span style="width:14px;height:14px;"></span></button>
            <button class="size-btn" data-size="26"><span style="width:20px;height:20px;"></span></button>
          </div>
        </div>

        <div class="tool-group">
          <label class="tool-label">Tool</label>
          <div class="tool-row">
            <button class="tool-btn active" id="btnDraw" title="Draw">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
              <span>Draw</span>
            </button>
            <button class="tool-btn" id="btnErase" title="Eraser">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l11-11 6 6-4 4"/><path d="M6 18l3-3"/></svg>
              <span>Erase</span>
            </button>
          </div>
        </div>

        <div class="tool-group">
          <button class="clear-btn" id="btnClear">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Clear canvas
          </button>
        </div>

      </aside>

      <main class="canvas-area">
        <div class="canvas-wrapper">
          <canvas id="canvas"></canvas>
        </div>
      </main>

    </div>

    <footer class="statusbar">
      <span id="coordDisplay">✦ ready to draw</span>
      <span id="leaderInfo"></span>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
