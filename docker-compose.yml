networks:
  raft-net:
    driver: bridge

services:

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
      - REPLICA1_URL=http://replica1:3001
      - REPLICA2_URL=http://replica2:3002
      - REPLICA3_URL=http://replica3:3003
    depends_on:
      - replica1
      - replica2
      - replica3
    networks:
      - raft-net
    restart: unless-stopped

  replica1:
    build: ./replica1
    container_name: replica1
    ports:
      - "3001:3001"
    environment:
      - REPLICA_ID=replica1
      - PORT=3001
      - GATEWAY_URL=http://gateway:8080
      - REPLICA1_URL=http://replica1:3001
      - REPLICA2_URL=http://replica2:3002
      - REPLICA3_URL=http://replica3:3003
    volumes:
      - ./replica1:/app
    networks:
      - raft-net
    restart: unless-stopped

  replica2:
    build: ./replica2
    container_name: replica2
    ports:
      - "3002:3002"
    environment:
      - REPLICA_ID=replica2
      - PORT=3002
      - GATEWAY_URL=http://gateway:8080
      - REPLICA1_URL=http://replica1:3001
      - REPLICA2_URL=http://replica2:3002
      - REPLICA3_URL=http://replica3:3003
    volumes:
      - ./replica2:/app
    networks:
      - raft-net
    restart: unless-stopped

  replica3:
    build: ./replica3
    container_name: replica3
    ports:
      - "3003:3003"
    environment:
      - REPLICA_ID=replica3
      - PORT=3003
      - GATEWAY_URL=http://gateway:8080
      - REPLICA1_URL=http://replica1:3001
      - REPLICA2_URL=http://replica2:3002
      - REPLICA3_URL=http://replica3:3003
    volumes:
      - ./replica3:/app
    networks:
      - raft-net
    restart: unless-stopped
