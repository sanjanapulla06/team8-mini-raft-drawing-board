<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RAFT Cluster Visualiser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #060d18;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 30px;
      background-image: radial-gradient(ellipse at 20% 20%, rgba(13,148,136,0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(30,64,175,0.05) 0%, transparent 50%);
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 30px; }
    h1 { font-size: 32px; color: #0d9488; letter-spacing: 4px; font-weight: 800; }
    .subtitle { font-size: 13px; color: #475569; margin-top: 6px; }
    .refresh-bar { text-align: center; font-size: 12px; color: #334155; margin: 12px 0 30px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #0d9488; margin-right: 6px; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── Node cards ── */
    .nodes-container { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; margin-bottom: 30px; }

    .node-card {
      background: #0f1e2e;
      border-radius: 20px;
      padding: 24px 20px 16px;
      width: 210px;
      text-align: center;
      border: 2px solid #1e3a50;
      transition: all 0.4s ease;
      position: relative;
    }

    .node-card.leader {
      border-color: #0d9488;
      background: linear-gradient(160deg, #0d2d29, #0a1f1c);
      box-shadow: 0 0 30px rgba(13,148,136,0.3), inset 0 0 30px rgba(13,148,136,0.05);
    }

    .node-card.follower {
      border-color: #1e40af;
      background: linear-gradient(160deg, #0d1b2a, #0a1520);
      box-shadow: 0 0 15px rgba(30,64,175,0.15);
    }

    .node-card.offline {
      border-color: #7f1d1d;
      background: linear-gradient(160deg, #1a0d0d, #110909);
      opacity: 0.7;
    }

    .node-circle {
      width: 75px; height: 75px; border-radius: 50%;
      margin: 0 auto 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; transition: all 0.4s ease;
    }

    .leader .node-circle { background: radial-gradient(circle, #0d9488, #065f46); box-shadow: 0 0 25px rgba(13,148,136,0.8); animation: pulse 1.5s infinite; }
    .follower .node-circle { background: radial-gradient(circle, #1e40af, #1e3a8a); box-shadow: 0 0 12px rgba(30,64,175,0.5); }
    .offline .node-circle { background: radial-gradient(circle, #7f1d1d, #450a0a); }

    @keyframes pulse {
      0%  { box-shadow: 0 0 15px rgba(13,148,136,0.7); }
      50% { box-shadow: 0 0 40px rgba(13,148,136,1.0); }
      100%{ box-shadow: 0 0 15px rgba(13,148,136,0.7); }
    }

    .node-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .node-state { font-size: 11px; font-weight: 700; letter-spacing: 2px; margin-bottom: 10px; }
    .leader .node-state  { color: #0d9488; }
    .follower .node-state { color: #3b82f6; }
    .offline .node-state  { color: #ef4444; }

    .node-info { font-size: 11px; color: #64748b; line-height: 1.9; margin-bottom: 12px; }
    .node-info span { display: block; }

    .last-seen { font-size: 10px; color: #334155; margin-bottom: 10px; }
    .last-seen.fresh { color: #0d9488; }
    .last-seen.stale { color: #f59e0b; }
    .last-seen.dead  { color: #ef4444; }

    /* ── Kill button ── */
    .kill-btn {
      width: 100%; padding: 6px 0; border-radius: 8px;
      border: 1px solid #7f1d1d; background: rgba(127,29,29,0.15);
      color: #ef4444; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      letter-spacing: 1px;
    }
    .kill-btn:hover { background: rgba(127,29,29,0.4); border-color: #ef4444; }
    .kill-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Stats ── */
    .stats-row { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-bottom: 30px; }
    .stat-box { background: #0f1e2e; border-radius: 14px; padding: 16px 28px; text-align: center; border: 1px solid #1e3a50; min-width: 140px; }
    .stat-value { font-size: 26px; font-weight: 800; color: #0d9488; }
    .stat-label { font-size: 10px; color: #475569; margin-top: 4px; letter-spacing: 1px; }

    /* ── Send stroke panel ── */
    .stroke-form { background: #0f1e2e; border-radius: 14px; padding: 20px; border: 1px solid #1e3a50; margin-bottom: 24px; }
    .stroke-form-title { font-size: 13px; font-weight: 700; color: #0d9488; letter-spacing: 2px; margin-bottom: 14px; }
    .stroke-inputs { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .stroke-inputs input {
      width: 70px; padding: 8px 10px; border-radius: 8px;
      background: #1e2d3d; border: 1px solid #2d3f50; color: #e2e8f0;
      font-size: 13px; text-align: center;
    }
    .stroke-inputs input:focus { outline: none; border-color: #0d9488; }
    .stroke-label { font-size: 11px; color: #64748b; }
    .send-btn {
      padding: 8px 20px; border-radius: 8px; border: none;
      background: #0d9488; color: white; font-size: 12px;
      font-weight: 700; cursor: pointer; transition: all 0.2s;
      letter-spacing: 1px; margin-left: auto;
    }
    .send-btn:hover { background: #0a7470; }
    .stroke-status { font-size: 12px; margin-top: 10px; min-height: 18px; }
    .stroke-status.ok  { color: #0d9488; }
    .stroke-status.err { color: #ef4444; }

    /* ── Panels ── */
    .panels { display: flex; gap: 20px; flex-wrap: wrap; }
    .panel { background: #0f1e2e; border-radius: 14px; padding: 20px; border: 1px solid #1e3a50; flex: 1; min-width: 300px; }
    .section-title { font-size: 13px; font-weight: 700; color: #0d9488; letter-spacing: 2px; margin-bottom: 14px; }

    .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .history-table th { background: #0d9488; color: white; padding: 9px 12px; text-align: left; font-weight: 600; letter-spacing: 1px; }
    .history-table td { padding: 9px 12px; border-bottom: 1px solid #1e2d3d; color: #cbd5e1; }
    .history-table tr:nth-child(even) td { background: #0d1b2a; }
    .history-table tr:last-child td { border-bottom: none; }
    .winner-badge { background: #0d9488; color: white; padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; }

    .no-data { color: #334155; font-size: 13px; text-align: center; padding: 20px; }

    .stroke-item { font-size: 12px; padding: 7px 0; border-bottom: 1px solid #1e2d3d; color: #94a3b8; display: flex; justify-content: space-between; }
    .stroke-item:last-child { border-bottom: none; }
  </style>
</head>
<body>

  <div class="header">
    <h1>⚡ RAFT CLUSTER VISUALISER</h1>
    <p class="subtitle">Mini-RAFT Distributed Drawing Board · Live Cluster Monitor</p>
  </div>

  <div class="refresh-bar"><span class="dot"></span> Auto-refreshing every 2 seconds</div>

  <!-- Node cards -->
  <div class="nodes-container" id="nodes"></div>

  <!-- Stats -->
  <div class="stats-row" id="stats"></div>

  <!-- Send stroke form -->
  <div class="stroke-form">
    <div class="stroke-form-title">🖊️ SEND TEST STROKE TO LEADER</div>
    <div class="stroke-inputs">
      <span class="stroke-label">x1</span>
      <input type="number" id="x1" value="10" />
      <span class="stroke-label">y1</span>
      <input type="number" id="y1" value="20" />
      <span class="stroke-label">x2</span>
      <input type="number" id="x2" value="30" />
      <span class="stroke-label">y2</span>
      <input type="number" id="y2" value="40" />
      <button class="send-btn" onclick="sendStroke()">SEND STROKE ➤</button>
    </div>
    <div class="stroke-status" id="stroke-status"></div>
  </div>

  <!-- Panels -->
  <div class="panels">
    <div class="panel">
      <div class="section-title">📋 ELECTION HISTORY</div>
      <div id="election-history"><p class="no-data">Loading...</p></div>
    </div>
    <div class="panel">
      <div class="section-title">📡 STROKE LOG</div>
      <div id="stroke-log"><p class="no-data">Loading...</p></div>
    </div>
  </div>

<script>
  const NODES = [
    { id: 1, port: 5001 },
    { id: 2, port: 5002 },
    { id: 3, port: 5003 },
  ];

  // track last seen times
  const lastSeen = {};

  async function fetchNode(port) {
    try {
      const r = await fetch(`http://localhost:${port}/status`, { signal: AbortSignal.timeout(1500) });
      lastSeen[port] = Date.now();
      return await r.json();
    } catch { return null; }
  }

  async function fetchHistory(port) {
    try {
      const r = await fetch(`http://localhost:${port}/election_history`);
      const d = await r.json();
      return d.elections || [];
    } catch { return []; }
  }

  async function fetchStrokes(port) {
    try {
      const r = await fetch(`http://localhost:${port}/get_strokes`);
      const d = await r.json();
      return d.strokes || [];
    } catch { return []; }
  }

  function emoji(id) { return ["🔵","🟣","🟠"][id-1] || "⚪"; }

  function lastSeenText(port) {
    if (!lastSeen[port]) return { text: "Never seen", cls: "dead" };
    const sec = Math.floor((Date.now() - lastSeen[port]) / 1000);
    if (sec < 3)  return { text: `Last seen: ${sec}s ago`, cls: "fresh" };
    if (sec < 10) return { text: `Last seen: ${sec}s ago`, cls: "stale" };
    return { text: `Last seen: ${sec}s ago`, cls: "dead" };
  }

  async function killNode(port, nodeId) {
    if (!confirm(`Kill Node ${nodeId}? This will trigger a new election.`)) return;
    try {
      await fetch(`http://localhost:${port}/shutdown`, { method: "POST" });
    } catch {}
  }

  async function sendStroke() {
    const x1 = parseInt(document.getElementById("x1").value);
    const y1 = parseInt(document.getElementById("y1").value);
    const x2 = parseInt(document.getElementById("x2").value);
    const y2 = parseInt(document.getElementById("y2").value);
    const statusEl = document.getElementById("stroke-status");

    // find leader port
    const statuses = await Promise.all(NODES.map(n => fetchNode(n.port)));
    const leader = statuses.find(s => s?.state === "leader");
    if (!leader) {
      statusEl.textContent = "❌ No leader available right now!";
      statusEl.className = "stroke-status err";
      return;
    }

    const leaderPort = NODES.find(n => n.id === leader.id)?.port;
    try {
      const r = await fetch(`http://localhost:${leaderPort}/stroke`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ stroke: { type: "stroke", x1, y1, x2, y2 } })
      });
      const d = await r.json();
      if (d.success) {
        statusEl.textContent = `✅ Stroke sent to Node ${leader.id} — replicated to ${d.replicated_to} node(s)`;
        statusEl.className = "stroke-status ok";
      } else {
        statusEl.textContent = `❌ Error: ${d.error}`;
        statusEl.className = "stroke-status err";
      }
    } catch {
      statusEl.textContent = "❌ Failed to send stroke";
      statusEl.className = "stroke-status err";
    }

    setTimeout(() => { statusEl.textContent = ""; }, 4000);
  }

  async function refresh() {
    const statuses = await Promise.all(NODES.map(n => fetchNode(n.port)));

    // ── Node cards ──
    document.getElementById("nodes").innerHTML = statuses.map((s, i) => {
      const node = NODES[i];
      const ls = lastSeenText(node.port);

      if (!s) return `
        <div class="node-card offline">
          <div class="node-circle">${emoji(node.id)}</div>
          <div class="node-name">Node ${node.id}</div>
          <div class="node-state">OFFLINE</div>
          <div class="node-info"><span>Port: ${node.port}</span></div>
          <div class="last-seen ${ls.cls}">${ls.text}</div>
          <button class="kill-btn" disabled>OFFLINE</button>
        </div>`;

      const cls    = s.state === "leader" ? "leader" : "follower";
      const crown  = s.state === "leader" ? " 👑" : "";
      return `
        <div class="node-card ${cls}">
          <div class="node-circle">${emoji(node.id)}</div>
          <div class="node-name">Node ${node.id}${crown}</div>
          <div class="node-state">${s.state.toUpperCase()}</div>
          <div class="node-info">
            <span>Term: ${s.term}</span>
            <span>Leader: Node ${s.leader ?? "?"}</span>
            <span>Port: ${node.port}</span>
          </div>
          <div class="last-seen ${ls.cls}">${ls.text}</div>
          <button class="kill-btn" onclick="killNode(${node.port}, ${node.id})">⛔ KILL NODE</button>
        </div>`;
    }).join("");

    // ── Stats ──
    const online = statuses.filter(Boolean).length;
    const leader = statuses.find(s => s?.state === "leader");
    const term   = leader?.term ?? (statuses.find(Boolean)?.term ?? "–");

    document.getElementById("stats").innerHTML = `
      <div class="stat-box"><div class="stat-value">${online}/3</div><div class="stat-label">NODES ONLINE</div></div>
      <div class="stat-box"><div class="stat-value">${leader ? `Node ${leader.id}` : "–"}</div><div class="stat-label">CURRENT LEADER</div></div>
      <div class="stat-box"><div class="stat-value">${term}</div><div class="stat-label">CURRENT TERM</div></div>`;

    // ── Election history ──
    const leaderPort = leader
      ? NODES.find(n => n.id === leader.id)?.port
      : NODES.find((n,i) => statuses[i])?.port;

    const history = leaderPort ? await fetchHistory(leaderPort) : [];
    const histEl  = document.getElementById("election-history");

    if (!history.length) {
      histEl.innerHTML = `<p class="no-data">No elections recorded yet</p>`;
    } else {
      const rows = [...history].reverse().map(e => `
        <tr>
          <td>${e.term}</td>
          <td><span class="winner-badge">Node ${e.winner}</span></td>
          <td>${e.votes}/${e.majority}</td>
          <td>${e.timestamp}</td>
        </tr>`).join("");
      histEl.innerHTML = `
        <table class="history-table">
          <thead><tr><th>Term</th><th>Winner</th><th>Votes</th><th>Time</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    // ── Stroke log ──
    const strokes  = leaderPort ? await fetchStrokes(leaderPort) : [];
    const strokeEl = document.getElementById("stroke-log");

    if (!strokes.length) {
      strokeEl.innerHTML = `<p class="no-data">No strokes recorded yet</p>`;
    } else {
      strokeEl.innerHTML =
        `<p style="color:#475569;font-size:11px;margin-bottom:10px">Total: ${strokes.length} stroke(s)</p>` +
        [...strokes].reverse().slice(0, 10).map((s, i) => `
          <div class="stroke-item">
            <span style="color:#64748b">#${strokes.length - i}</span>
            <span>(${s.x1}, ${s.y1}) → (${s.x2}, ${s.y2})</span>
            <span style="color:#334155">${s.type || "stroke"}</span>
          </div>`).join("") +
        (strokes.length > 10
          ? `<p style="color:#334155;font-size:11px;margin-top:8px">... and ${strokes.length - 10} more</p>`
          : "");
    }
  }

  refresh();
  setInterval(refresh, 2000);
</script>
</body>
</html>
